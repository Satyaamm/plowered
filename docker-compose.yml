# All values default to .env / .env.example. Override per-shell with
# `POSTGRES_USER=alice docker compose up -d` when needed.

services:
  postgres:
    image: postgres:16-alpine
    container_name: plowered-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-plowered}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-plowered}
      POSTGRES_DB: ${POSTGRES_DB:-plowered}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-plowered}"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
