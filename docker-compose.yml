# Plowered local stack. `docker compose up -d` brings up everything you
# need for a first live boot: Postgres + Redis + NATS + MinIO for storage,
# `plowered` for the API, `plowered-worker` for async jobs, `web` for the
# Next.js UI on :3000.
#
# Defaults assume the .env at repo root. Override per-shell with
# `POSTGRES_USER=alice docker compose up -d`.
#
# Single source of truth: do not duplicate defaults in code, docker-compose,
# or CI configs — read from .env.example or override at runtime.

services:
  postgres:
    image: postgres:16-alpine
    container_name: plowered-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-plowered}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-plowered}
      POSTGRES_DB: ${POSTGRES_DB:-plowered}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-plowered}"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: plowered-redis
    command: ["redis-server", "--appendonly", "yes", "--maxmemory-policy", "allkeys-lru"]
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  nats:
    image: nats:2.10-alpine
    container_name: plowered-nats
    command: ["-js", "-sd", "/data", "-m", "8222"]
    ports:
      - "${NATS_CLIENT_PORT:-4222}:4222"
      - "${NATS_MONITOR_PORT:-8222}:8222"
    volumes:
      - natsdata:/data
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8222/healthz | grep -q ok"]
      interval: 5s
      timeout: 3s
      retries: 5

  minio:
    image: minio/minio:latest
    container_name: plowered-minio
    command: ["server", "/data", "--console-address", ":9001"]
    environment:
      MINIO_ROOT_USER: ${PLOWERED_S3_ACCESS_KEY:-minioadmin}
      MINIO_ROOT_PASSWORD: ${PLOWERED_S3_SECRET_KEY:-minioadmin}
    ports:
      - "${MINIO_PORT:-9000}:9000"
      - "${MINIO_CONSOLE_PORT:-9001}:9001"
    volumes:
      - miniodata:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── First-boot initialisers ────────────────────────────────────────────
  # Both services run to completion ("restart: no") and exit. Idempotent
  # on re-run because the bucket / key file already exists.
  #
  # Why these exist: without them, a fresh `docker compose up -d` would
  # require an operator to (1) open the MinIO console and create two
  # buckets, and (2) generate + paste a base64 master key into .env. We'd
  # rather the stack just work on first boot.

  minio-init:
    image: minio/mc:latest
    container_name: plowered-minio-init
    depends_on:
      minio: { condition: service_healthy }
    entrypoint:
      - sh
      - -c
      - |
        mc alias set local http://minio:9000 "$$MINIO_ROOT_USER" "$$MINIO_ROOT_PASSWORD" &&
        mc mb --ignore-existing local/${PLOWERED_S3_BUCKET_LOGS:-plowered-logs} &&
        mc mb --ignore-existing local/${PLOWERED_S3_BUCKET_AUDIT:-plowered-audit} &&
        echo "minio-init: buckets ready"
    environment:
      MINIO_ROOT_USER: ${PLOWERED_S3_ACCESS_KEY:-minioadmin}
      MINIO_ROOT_PASSWORD: ${PLOWERED_S3_SECRET_KEY:-minioadmin}
    restart: "no"

  secrets-init:
    image: alpine:3.20
    container_name: plowered-secrets-init
    entrypoint:
      - sh
      - -c
      - |
        if [ ! -s /secrets/master.key ]; then
          apk add --no-cache openssl >/dev/null &&
          openssl rand -base64 32 > /secrets/master.key &&
          chmod 600 /secrets/master.key &&
          echo "secrets-init: generated /secrets/master.key"
        else
          echo "secrets-init: /secrets/master.key already exists"
        fi
    volumes:
      - secretsdata:/secrets
    restart: "no"

  # ── Plowered services ──────────────────────────────────────────────────
  plowered:
    build:
      context: .
      dockerfile: deploy/docker/Dockerfile
    image: plowered/plowered:dev
    container_name: plowered-api
    depends_on:
      postgres:     { condition: service_healthy }
      redis:        { condition: service_healthy }
      nats:         { condition: service_started }
      secrets-init: { condition: service_completed_successfully }
      minio-init:   { condition: service_completed_successfully }
    environment:
      PLOWERED_ENV: ${PLOWERED_ENV:-dev}
      PLOWERED_VERSION: ${PLOWERED_VERSION:-dev}
      PLOWERED_HTTP_ADDR: ":8080"
      PLOWERED_GRPC_ADDR: ":9090"
      PLOWERED_DATABASE_URL: postgres://${POSTGRES_USER:-plowered}:${POSTGRES_PASSWORD:-plowered}@postgres:5432/${POSTGRES_DB:-plowered}?sslmode=disable
      PLOWERED_REDIS_URL: redis://redis:6379/0
      PLOWERED_NATS_URL: nats://nats:4222
      PLOWERED_CORS_ALLOWED_ORIGINS: "*"
      # Auth + email
      PLOWERED_WEB_BASE_URL: ${PLOWERED_WEB_BASE_URL:-http://localhost:3000}
      PLOWERED_EMAIL_FROM: ${PLOWERED_EMAIL_FROM:-Plowered <onboarding@resend.dev>}
      PLOWERED_RESEND_API_KEY: ${PLOWERED_RESEND_API_KEY:-}
      PLOWERED_SESSION_COOKIE: ${PLOWERED_SESSION_COOKIE:-plowered_session}
      PLOWERED_SESSION_COOKIE_SECURE: ${PLOWERED_SESSION_COOKIE_SECURE:-0}
      # Vault master key: env var wins; otherwise read from the file the
      # secrets-init container wrote. Either way, sealed secrets survive
      # restarts without operator intervention.
      PLOWERED_SECRETS_MASTER_KEY: ${PLOWERED_SECRETS_MASTER_KEY:-}
      PLOWERED_SECRETS_MASTER_KEY_FILE: /run/secrets/master.key
    volumes:
      - secretsdata:/run/secrets:ro
    ports:
      - "${PLOWERED_HTTP_PORT:-8080}:8080"
      - "${PLOWERED_GRPC_PORT:-9090}:9090"
    restart: unless-stopped

  plowered-worker:
    build:
      context: .
      dockerfile: deploy/docker/worker.Dockerfile
    image: plowered/worker:dev
    container_name: plowered-worker
    depends_on:
      postgres:     { condition: service_healthy }
      redis:        { condition: service_healthy }
      secrets-init: { condition: service_completed_successfully }
    environment:
      PLOWERED_DATABASE_URL: postgres://${POSTGRES_USER:-plowered}:${POSTGRES_PASSWORD:-plowered}@postgres:5432/${POSTGRES_DB:-plowered}?sslmode=disable
      PLOWERED_REDIS_URL: redis://redis:6379/0
      PLOWERED_WORKER_CONCURRENCY: "10"
      PLOWERED_SECRETS_MASTER_KEY: ${PLOWERED_SECRETS_MASTER_KEY:-}
      PLOWERED_SECRETS_MASTER_KEY_FILE: /run/secrets/master.key
    volumes:
      - secretsdata:/run/secrets:ro
    restart: unless-stopped

  web:
    build:
      context: .
      dockerfile: deploy/docker/web.Dockerfile
      args:
        PLOWERED_API_BASE: http://plowered:8080
    image: plowered/web:dev
    container_name: plowered-web
    depends_on:
      plowered: { condition: service_started }
    environment:
      # The Next.js rewrite uses this as the upstream for /api/* — inside
      # the compose network the API is reachable as `plowered:8080`.
      PLOWERED_API_BASE: http://plowered:8080
      NEXT_PUBLIC_PLOWERED_TOKEN: dev
      NEXT_PUBLIC_APP_NAME: PurpleCube AI Studio
    ports:
      - "${WEB_PORT:-3000}:3000"
    restart: unless-stopped

  # Optional metrics store. Enable with: `docker compose --profile metrics up -d`
  clickhouse:
    image: clickhouse/clickhouse-server:24.8-alpine
    container_name: plowered-clickhouse
    profiles: ["metrics"]
    ports:
      - "8123:8123"
      - "9100:9000"
    volumes:
      - chdata:/var/lib/clickhouse
    ulimits:
      nofile:
        soft: 262144
        hard: 262144

volumes:
  pgdata:
  redisdata:
  natsdata:
  miniodata:
  chdata:
  # Holds /secrets/master.key, generated by secrets-init on first boot.
  # The API + worker mount this volume read-only.
  secretsdata:
