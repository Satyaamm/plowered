services:
  postgres:
    image: postgres:16-alpine
    container_name: plowered-postgres
    environment:
      POSTGRES_USER: plowered
      POSTGRES_PASSWORD: plowered
      POSTGRES_DB: plowered
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U plowered"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
