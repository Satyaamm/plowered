apiVersion: v2
name: plowered
description: The open context layer for AI agents.
type: application
version: 0.2.0
appVersion: "0.2.0"
icon: https://raw.githubusercontent.com/Satyaamm/plowered/main/web/public/icon.png
home: https://github.com/Satyaamm/plowered
sources:
  - https://github.com/Satyaamm/plowered
maintainers:
  - name: Satyaamm
    url: https://github.com/Satyaamm
keywords:
  - data-catalog
  - mcp
  - ai-context
  - lineage
  - orchestration

# Optional sub-charts. Disabled by default — production deploys point at
# managed services (RDS, MemoryDB, etc.). Enable with:
#   --set postgresql.enabled=true --set redis.enabled=true
dependencies:
  - name: postgresql
    version: "16.x.x"
    repository: https://charts.bitnami.com/bitnami
    condition: postgresql.enabled
  - name: redis
    version: "20.x.x"
    repository: https://charts.bitnami.com/bitnami
    condition: redis.enabled
