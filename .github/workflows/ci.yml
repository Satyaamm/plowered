name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  proto:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: bufbuild/buf-setup-action@v1
      - run: buf lint
      - run: buf format --diff --exit-code
      - uses: bufbuild/buf-breaking-action@v1
        if: github.event_name == 'pull_request'
        with:
          against: 'https://github.com/${{ github.repository }}.git#branch=main'

  go:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: plowered
          POSTGRES_PASSWORD: plowered
          POSTGRES_DB: plowered
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U plowered"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5
    env:
      PLOWERED_TEST_DATABASE_URL: postgres://plowered:plowered@localhost:5432/plowered?sslmode=disable
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.23'
      - run: go vet ./...
      - run: go build ./...
      - run: go test ./... -race -count=1

  web:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: web/package-lock.json
      - run: npm ci --no-audit --no-fund
      - run: npm run typecheck
      - run: npm run build
        env:
          NEXTAUTH_SECRET: ci-build-only-not-secret

  helm:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: azure/setup-helm@v4
        with:
          version: v3.16.2
      - name: Helm dependency build
        run: helm dependency update deploy/helm/plowered
      - name: Helm lint
        run: helm lint deploy/helm/plowered
      - name: Helm template (smoke)
        run: |
          helm template plowered deploy/helm/plowered \
            --set secrets.values.databaseUrl=postgres://x:x@localhost:5432/x \
            --set secrets.values.redisUrl=redis://localhost:6379/0 \
            > /tmp/rendered.yaml
          test -s /tmp/rendered.yaml
          echo "rendered $(wc -l < /tmp/rendered.yaml) lines"
