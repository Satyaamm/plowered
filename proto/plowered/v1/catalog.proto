syntax = "proto3";

package plowered.v1;

import "google/api/annotations.proto";
import "google/protobuf/struct.proto";
import "plowered/v1/common.proto";

// Asset is the unit of metadata in Plowered.
message Asset {
  string                  id              = 1;
  string                  qualified_name  = 2;  // e.g. warehouse://prod.analytics.orders
  AssetType               type            = 3;
  string                  name            = 4;
  string                  description     = 5;
  string                  description_ai  = 6;  // last machine-generated description
  TrustLevel              trust           = 7;
  repeated Tag            tags            = 8;
  repeated Owner          owners          = 9;
  google.protobuf.Struct  properties      = 10; // type-specific fields
  Audit                   audit           = 11;
  string                  tenant_id       = 12;
}

// CatalogService manages the asset graph: CRUD, search, browse.
service CatalogService {
  rpc CreateAsset(CreateAssetRequest) returns (Asset) {
    option (google.api.http) = {
      post: "/v1/assets"
      body: "asset"
    };
  }

  rpc GetAsset(GetAssetRequest) returns (Asset) {
    option (google.api.http) = {
      get: "/v1/assets/{id}"
    };
  }

  rpc GetAssetByQualifiedName(GetAssetByQualifiedNameRequest) returns (Asset) {
    option (google.api.http) = {
      get: "/v1/assets:byQualifiedName"
    };
  }

  rpc UpdateAsset(UpdateAssetRequest) returns (Asset) {
    option (google.api.http) = {
      patch: "/v1/assets/{asset.id}"
      body: "asset"
    };
  }

  rpc DeleteAsset(DeleteAssetRequest) returns (DeleteAssetResponse) {
    option (google.api.http) = {
      delete: "/v1/assets/{id}"
    };
  }

  rpc ListAssets(ListAssetsRequest) returns (ListAssetsResponse) {
    option (google.api.http) = {
      get: "/v1/assets"
    };
  }

  rpc SearchAssets(SearchAssetsRequest) returns (SearchAssetsResponse) {
    option (google.api.http) = {
      post: "/v1/assets:search"
      body: "*"
    };
  }
}

message CreateAssetRequest { Asset asset = 1; }

message GetAssetRequest { string id = 1; }

message GetAssetByQualifiedNameRequest { string qualified_name = 1; }

message UpdateAssetRequest {
  Asset asset = 1;
  // FieldMask-style list of paths to update.
  repeated string update_mask = 2;
}

message DeleteAssetRequest  { string id = 1; }
message DeleteAssetResponse { bool deleted = 1; }

message ListAssetsRequest {
  AssetType  type         = 1;
  string     parent_id    = 2;     // e.g. list columns of a table
  Pagination pagination   = 3;
}
message ListAssetsResponse {
  repeated Asset assets   = 1;
  PageInfo       page     = 2;
}

message SearchAssetsRequest {
  string             query        = 1;
  repeated AssetType types        = 2;
  repeated string    tag_ids      = 3;
  TrustLevel         min_trust    = 4;
  Pagination         pagination   = 5;
}
message SearchAssetsResponse {
  repeated SearchHit hits = 1;
  PageInfo           page = 2;
}
message SearchHit {
  Asset  asset       = 1;
  float  score       = 2;
  string highlight   = 3;
}
